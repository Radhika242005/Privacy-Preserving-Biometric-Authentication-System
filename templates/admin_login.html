<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <style>
        body {
            background: linear-gradient(to right, #000428, #004e92);
            font-family: Arial;
            text-align: center;
            color: white;
        }

        .box {
            width: 400px;
            margin: 120px auto;
            padding: 30px;
            background: rgba(255,255,255,0.15);
            border-radius: 15px;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 12px;
            border-radius: 10px;
            border: none;
        }

        button {
            padding: 12px 25px;
            background: #00ffcc;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #00ccaa;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>👑 Admin Login</h2>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="POST">

    <input type="text" name="admin_username"
           placeholder="Enter Admin Username" required>

    <input type="password" name="admin_password"
           placeholder="Enter Admin Password" required>

    <button type="submit">Login</button>

</form>

</div>

</body>
</html>
