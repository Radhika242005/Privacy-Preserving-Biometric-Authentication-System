<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hybrid Face Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #141e30, #243b55);
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 420px;
            margin: 60px auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.4);
        }

        h2 {
            margin-bottom: 20px;
            font-size: 22px;
            color: #00e6ff;
        }

        h3 {
            background: rgba(0, 255, 100, 0.2);
            padding: 10px;
            border-radius: 10px;
            font-size: 16px;
        }

        video {
            border-radius: 12px;
            border: 3px solid #00e6ff;
            margin-top: 15px;
        }

        button {
            background: #00e6ff;
            color: black;
            border: none;
            padding: 12px 18px;
            margin: 10px;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        button:hover {
            background: #00b8cc;
            transform: scale(1.05);
        }

        input {
            width: 90%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 15px;
        }

        hr {
            margin: 20px 0;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .footer {
            margin-top: 20px;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
        }

        /* ✅ Admin Button Styling */
        .admin-btn {
            background: #00b8cc;
            color: black;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }

        .admin-btn:hover {
            background: #0099b3;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="container">

    <h2>🔐 Privacy Preserving Face Authentication</h2>

    {% if result %}
        <h3>{{ result }}</h3>
    {% endif %}

    <hr>

    <!-- Webcam -->
    <video id="video" width="320" height="240" autoplay></video>

    <br><br>

    <!-- Capture Button -->
    <button onclick="capture()">📸 Capture Face</button>

    <canvas id="canvas" width="320" height="240" style="display:none;"></canvas>

    <!-- Form -->
    <form method="POST">

        <input type="text" name="username" placeholder="Enter Username" required>

        <input type="hidden" name="imageData" id="imageData">

        <br>

        <button formaction="/register">Register</button>
        <button formaction="/authenticate">Login</button>

    </form>

    <!-- ✅ Admin Dashboard Button -->
    <button class="admin-btn" onclick="window.location.href='/admin_dashboard'">
        👑 Admin Dashboard
    </button>

    <div class="footer">
        Hybrid AES Encryption + Adaptive FAISS Matching
    </div>

</div>

<script>
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    document.getElementById("video").srcObject = stream;
});

function capture() {
    let canvas = document.getElementById("canvas");
    let video = document.getElementById("video");

    canvas.getContext("2d").drawImage(video, 0, 0, 320, 240);

    let dataURL = canvas.toDataURL("image/png");
    document.getElementById("imageData").value = dataURL;

    alert("✅ Face Captured Successfully!");
}
</script>

</body>
</html>
